    <style>
        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #080b1a;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: radial-gradient(ellipse at 20% 30%, rgba(255, 45, 149, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(37, 117, 252, 0.08) 0%, transparent 50%),
                #080b1a;
        }

        /* ─── CARD ─── */
        .card {
            max-width: 520px;
            width: 100%;
            background: #0f1329;
            border-radius: 36px;
            border: 2px solid transparent;
            background-image: linear-gradient(#0f1329, #0f1329),
                linear-gradient(135deg, #ff2d95, #2575fc, #f7971e, #ff2d95);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            overflow: hidden;
            animation: cardFade 0.7s ease;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            transition: all 0.3s ease;
        }

        @keyframes cardFade {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ─── BANNER ─── */
        .banner-wrapper {
            width: 100%;
            aspect-ratio: 16 / 7;
            position: relative;
            overflow: hidden;
        }

        .banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .banner:hover {
            transform: scale(1.02);
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.65) 100%);
        }

        /* ─── CONTENT ─── */
        .content {
            padding: clamp(1.5rem, 6vw, 3rem);
            text-align: center;
        }

        /* ===== PREMIUM TYPOGRAPHY ===== */
        .name {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-size: clamp(2.2rem, 10vw, 3.8rem);
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #c8d6e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 20px rgba(255, 255, 255, 0.08);
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }

        /* ===== TOP BUTTON (FULL WIDTH - BIG) ===== */
        .btn-top-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.6rem, 2vw, 1rem);
            width: 100%;
            padding: clamp(0.9rem, 3vw, 1.4rem) clamp(1.5rem, 4vw, 2.5rem);
            font-family: 'Poppins', 'Inter', sans-serif;
            font-size: clamp(1rem, 4.5vw, 1.4rem);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-radius: 60px;
            margin-top: clamp(0.8rem, 3vw, 1.5rem);
            text-decoration: none;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #ff2d95 0%, #ff5eb8 30%, #7c3aed 70%, #2575fc 100%);
            background-size: 200% 200%;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 6px 32px rgba(255, 45, 149, 0.45), 0 0 60px rgba(255, 45, 149, 0.15);
            animation: gradientShift 4s ease-in-out infinite;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .btn-top-cta .icon {
            width: clamp(1.2rem, 4vw, 1.6rem);
            height: clamp(1.2rem, 4vw, 1.6rem);
            fill: currentColor;
            flex-shrink: 0;
            animation: pulseIcon 2.4s ease-in-out infinite;
        }

        .btn-top-cta .btn-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-25deg);
            transition: left 0.85s ease;
            z-index: 1;
            pointer-events: none;
        }

        .btn-top-cta:hover .btn-shimmer {
            left: 100%;
        }

        .btn-top-cta:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 44px rgba(255, 45, 149, 0.6), 0 0 80px rgba(255, 45, 149, 0.2);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn-top-cta:active {
            transform: scale(0.96) !important;
        }

        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        /* ─── BADGE ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(0.6rem, 2.2vw, 0.8rem);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: clamp(0.3rem, 1vw, 0.6rem) clamp(1rem, 3vw, 1.5rem);
            border-radius: 100px;
            background: linear-gradient(135deg, #ff2d95, #ff5eb8);
            color: #fff;
            margin-top: clamp(0.6rem, 2vw, 1rem);
            box-shadow: 0 4px 20px rgba(255, 45, 149, 0.3);
        }

        .badge .sparkle {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
        }

        /* ─── TAGLINE ─── */
        .tagline {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.75);
            margin-top: clamp(0.6rem, 2vw, 1rem);
            padding: 0 2px;
            letter-spacing: 0.1px;
        }

        .tagline strong {
            color: #fff;
            font-weight: 600;
        }

        /* ─── STATS ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(0.5rem, 2vw, 1rem);
            margin: clamp(1.2rem, 4vw, 2rem) 0 clamp(1rem, 3vw, 1.5rem);
        }

        .stat {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: clamp(0.8rem, 2.5vw, 1.2rem);
            padding: clamp(0.8rem, 2.5vw, 1.5rem) clamp(0.2rem, 1vw, 0.5rem);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .stat:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .stat .num {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-size: clamp(1.4rem, 6vw, 2.4rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .stat .num.pink {
            background: linear-gradient(135deg, #ff5eb8, #ff2d95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat .num.blue {
            background: linear-gradient(135deg, #4fb2ff, #2575fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat .num.gold {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat .num .small-star {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            -webkit-text-fill-color: initial;
            color: #f7971e;
        }

        .stat .label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.5rem, 1.8vw, 0.7rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
        }

        /* ─── DIVIDER ─── */
        .divider {
            height: 2px;
            border-radius: 4px;
            margin: clamp(0.5rem, 2vw, 1rem) 0 clamp(1.2rem, 3.5vw, 2rem);
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 45, 149, 0.35) 20%,
                    rgba(37, 117, 252, 0.35) 50%,
                    rgba(247, 151, 30, 0.35) 80%,
                    transparent);
        }

        /* ─── BOTTOM SINGLE BUTTON (PRIMARY - EVEN BIGGER) ─── */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.6rem, 2vw, 1rem);
            width: 100%;
            padding: clamp(1rem, 3.5vw, 1.6rem) clamp(1.5rem, 4vw, 2.5rem);
            border-radius: clamp(1rem, 3vw, 1.5rem);
            font-family: 'Poppins', 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(1.1rem, 5vw, 1.6rem);
            letter-spacing: 0.6px;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            background: linear-gradient(135deg, #ff2d95 0%, #ff5eb8 30%, #7c3aed 70%, #2575fc 100%);
            background-size: 200% 200%;
            color: #fff;
            box-shadow: 0 10px 38px rgba(255, 45, 149, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            animation: gradientShift 4s ease-in-out infinite;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary .icon {
            width: clamp(1.4rem, 4.5vw, 2rem);
            height: clamp(1.4rem, 4.5vw, 2rem);
            fill: currentColor;
            flex-shrink: 0;
            animation: pulseIcon 2.4s ease-in-out infinite;
        }

        .btn-primary .btn-text {
            position: relative;
            z-index: 2;
            font-size: inherit;
            font-weight: 700;
            letter-spacing: 0.6px;
        }

        .btn-primary .btn-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-25deg);
            transition: left 0.85s ease;
            z-index: 1;
            pointer-events: none;
        }

        .btn-primary:hover .btn-shimmer {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 18px 54px rgba(255, 45, 149, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.08) inset;
        }

        .btn-primary:active {
            transform: scale(0.96) !important;
            transition-duration: 0.08s;
        }

        /* ─── FOOTER ─── */
        .footer-note {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.2);
            margin-top: clamp(1rem, 3.5vw, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.2px;
            flex-wrap: wrap;
        }

        .footer-note .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
        }

        .footer-note .lock-icon {
            opacity: 0.4;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        /* ─── REDUCE MOTION ─── */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .btn .btn-shimmer {
                display: none;
            }
        }
    </style>
</head>
