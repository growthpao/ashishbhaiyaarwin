<style>
  :root{
    --ink:#0B0E1E;
    --card:#12162C;
    --card-edge:rgba(255,255,255,.06);
    --sun:#FFB238;
    --coral:#FF5A6E;
    --violet:#8B5CF6;
    --sky:#33C9FF;
    --text-dim:rgba(255,255,255,.62);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    min-height:100vh; min-height:100dvh;
    background:
      radial-gradient(circle at 22% 18%, rgba(139,92,246,.20) 0%, transparent 42%),
      radial-gradient(circle at 82% 78%, rgba(51,201,255,.16) 0%, transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(255,90,110,.10) 0%, transparent 50%),
      var(--ink);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px 14px;
  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }

  .card{
    position:relative;
    max-width:420px; width:100%;
    background:linear-gradient(180deg, var(--card) 0%, #0E1226 100%);
    border-radius:32px;
    border:1px solid var(--card-edge);
    box-shadow:0 40px 90px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.02) inset;
    padding:44px 30px 34px;
    text-align:center;
    animation:cardIn .7s cubic-bezier(.2,.8,.2,1);
    overflow:hidden;
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(24px) scale(.97);} to{ opacity:1; transform:none;} }

  /* ambient drifting glow behind avatar */
  .glow{
    position:absolute; top:-120px; left:50%; transform:translateX(-50%);
    width:340px; height:340px; border-radius:50%;
    background:conic-gradient(from 0deg, var(--violet), var(--sky), var(--coral), var(--sun), var(--violet));
    filter:blur(70px); opacity:.35;
    animation:spin 14s linear infinite;
    pointer-events:none;
  }
  @keyframes spin{ to{ transform:translateX(-50%) rotate(360deg); } }

  /* ===== AVATAR ===== */
  .avatar-wrap{
    position:relative; width:132px; height:132px; margin:0 auto 20px;
  }
  .avatar-ring{
    position:absolute; inset:-6px; border-radius:50%;
    background:conic-gradient(var(--violet), var(--sky), var(--sun), var(--coral), var(--violet));
    animation:spin 6s linear infinite;
  }
  .avatar-ring::after{
    content:""; position:absolute; inset:5px; border-radius:50%; background:var(--card);
  }
  .avatar{
    position:absolute; inset:8px; border-radius:50%; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    animation:float 4.5s ease-in-out infinite;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
  @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }

  .live-dot{
    position:absolute; bottom:6px; right:6px; width:22px; height:22px;
    background:#22C55E; border:3px solid var(--card); border-radius:50%;
    box-shadow:0 0 0 0 rgba(34,197,94,.6);
    animation:pulseDot 2s ease-out infinite;
  }
  @keyframes pulseDot{
    0%{ box-shadow:0 0 0 0 rgba(34,197,94,.55); }
    70%{ box-shadow:0 0 0 10px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }

  /* ===== NAME + DESC ===== */
  .name{
    font-family:'Fraunces', serif; font-weight:800; font-optical-sizing:auto;
    font-size:clamp(1.7rem, 7vw, 2.2rem); color:#fff; letter-spacing:-.2px;
    line-height:1.15;
  }

  .verified{ display:inline-flex; vertical-align:middle; margin-left:6px; width:20px; height:20px; }

  .badge-row{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:10px;
  }
  .badge{
    font-size:.72rem; font-weight:700; letter-spacing:.03em;
    color:var(--sun); background:rgba(255,178,56,.12);
    border:1px solid rgba(255,178,56,.3);
    padding:4px 10px; border-radius:100px;
  }
  .badge.blue{ color:var(--sky); background:rgba(51,201,255,.12); border-color:rgba(51,201,255,.3); }

  .desc{
    margin-top:16px; font-size:.98rem; line-height:1.65;
    color:var(--text-dim); max-width:32ch; margin-left:auto; margin-right:auto;
  }
  .desc strong{ color:#fff; font-weight:700; }

  /* ===== BUTTONS ===== */
  .buttons{ margin-top:28px; display:flex; flex-direction:column; gap:12px; }

  .btn{
    position:relative; display:flex; align-items:center; justify-content:center;
    gap:10px; width:100%; padding:16px 20px; border-radius:16px;
    font-family:'Inter', sans-serif; font-weight:700; font-size:1.02rem;
    letter-spacing:.01em; text-decoration:none; cursor:pointer;
    border:none; overflow:hidden; -webkit-tap-highlight-color:transparent;
    transition:transform .3s cubic-bezier(.25,.46,.45,.94), box-shadow .3s ease;
  }
  .btn svg{ width:20px; height:20px; fill:currentColor; flex-shrink:0; }
  .btn:active{ transform:scale(.96) !important; }

  .btn-red{
    color:#fff;
    background:linear-gradient(115deg, #FF3B57 0%, #FF5A6E 45%, #FF3B57 100%);
    background-size:250% 250%;
    animation:gradientMove 4s ease infinite;
    box-shadow:0 14px 34px rgba(255,59,87,.4), 0 4px 10px rgba(255,59,87,.2);
  }
  @keyframes gradientMove{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
  .btn-red::before, .btn-blue::before{
    content:""; position:absolute; top:0; left:-120%; width:70%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,.35), transparent);
    transform:skewX(-20deg); animation:shimmer 2.6s ease-in-out infinite;
  }
  @keyframes shimmer{ 0%{ left:-120%; } 45%,100%{ left:130%; } }
  .btn-red:hover{ transform:translateY(-3px); box-shadow:0 20px 42px rgba(255,59,87,.5), 0 6px 14px rgba(255,59,87,.25); }

  .btn-blue{
    color:#fff;
    background:linear-gradient(115deg, #229ED9 0%, #33C9FF 45%, #229ED9 100%);
    background-size:250% 250%;
    animation:gradientMove 4s ease infinite;
    box-shadow:0 14px 34px rgba(34,158,217,.4), 0 4px 10px rgba(34,158,217,.2);
  }
  .btn-blue:hover{ transform:translateY(-3px); box-shadow:0 20px 42px rgba(34,158,217,.5), 0 6px 14px rgba(34,158,217,.25); }

  .fineprint{
    margin-top:18px; font-size:.74rem; color:rgba(255,255,255,.32);
    display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
  }
  .fineprint .dot{ width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,.2); }
</style>
